services:
  warmap-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: warmap-server:latest
    container_name: warmap-server
    restart: unless-stopped

    # Single port, bound only to the management interface so the service
    # is only reachable via the LAN -- pfSense HAProxy proxies in from
    # there.  No public exposure on the host; everything goes through:
    #
    #   Internet -> Cloudflare (orange cloud, edge cert) -> pfSense:443
    #     -> HAProxy frontend (Host: d4data.live SNI check)
    #       -> HAProxy backend (HTTP, LAN-internal)
    #         -> 192.168.10.91:8000  (this server)
    #
    # If you ever need to test from another LAN host, change the bind to
    # "0.0.0.0:8000:8000" or "192.168.10.0/24" -- but the default is
    # locked to mgmt0 so no surprises.
    ports:
      - "192.168.10.91:8000:8000"

    environment:
      WARMAP_API_KEY:           ${WARMAP_API_KEY:?missing WARMAP_API_KEY}
      # Re-merge every 60s so the live viewer reflects in-progress sessions.
      # The merger handles ~10 sessions in ~5s so this is comfortable.
      WARMAP_MERGE_INTERVAL_S: "60"
      WARMAP_ROOT:             "/data"

    volumes:
      - warmap-data:/data

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  warmap-data:
    name: warmap-data
