services:
  warmap-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: warmap-server:latest
    container_name: warmap-server
    restart: unless-stopped

    # Single port on 8000.  Bound to all LAN interfaces (0.0.0.0) so:
    #   * pfSense HAProxy can reach it at 192.168.10.91:8000 for the
    #     d4data.live -> on-prem path
    #   * the operator can hit it directly from any LAN machine for
    #     dev/debug at <on-prem-ip>:8000 without going through CF
    #   * a future second NIC (Chelsio at 192.168.10.93) can serve it
    #     too without a compose change
    #
    # No public exposure on the box itself -- WAN ingress is firewalled
    # at pfSense to only accept :443 from Cloudflare's IP ranges.
    # Auth gating is at the FastAPI layer (X-WarMap-Key required on
    # every read endpoint), so a wide bind doesn't weaken access
    # control -- just removes a gratuitous LAN-side restriction.
    #
    # Topology:
    #   Internet -> Cloudflare (orange cloud, edge cert) -> pfSense:443
    #     -> HAProxy frontend (Host: d4data.live SNI check)
    #       -> HAProxy backend (HTTP, LAN-internal)
    #         -> <on-prem>:8000  (this server, any LAN interface)
    ports:
      - "8000:8000"

    environment:
      WARMAP_API_KEY:           ${WARMAP_API_KEY:?missing WARMAP_API_KEY}
      # Re-merge every 30s.  On the on-prem 16-core / 30 GB box this is
      # cheap (full set of dumps fits in RAM page cache after the first
      # cycle) and gives the live viewer near-real-time updates as
      # friends play.  Bump to 60+ if you ever migrate back to a small VPS.
      WARMAP_MERGE_INTERVAL_S: "30"
      WARMAP_ROOT:             "/data"
      # Use the on-prem hardware properly.  16 cores -> 12 uvicorn
      # workers (leave a few for the OS / merger / docker-proxy).  Box
      # has 30 GB RAM so worker memory ceiling is never the constraint.
      WARMAP_WORKERS:          "12"

    volumes:
      - warmap-data:/data

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  warmap-data:
    name: warmap-data
